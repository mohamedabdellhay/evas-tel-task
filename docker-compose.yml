

services:
  
  # Application Service
  app:
    build:
      context: .
      target: development
    ports:
      - '${PORT}:${PORT}'
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - redis
      - mongodb
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

  # Redis Service
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'

  # Database Service
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - '${MONGO_PORT}:${MONGO_PORT}'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    volumes:
      - e_vas_task_db:/data/db

volumes:
  e_vas_task_db:
